stages:
  - secret-scan
  - trivy-scan
  - sonarqube-check
  - sonarqube-vulnerability-report
  - Build
  - Deploy

variables:
  IMAGE_NAME: 'dpw/admin'
  TAG: 'latest'
  CONTAINERNAME: 'admin'
  PORT: '3003'
  SONAR_USER_HOME: '${CI_PROJECT_DIR}/.sonar'
  GIT_DEPTH: '0'
  REGISTRY_URL: '192.168.0.95:8082'

# Stage 0: Secret Scan with Gitleaks via Docker
gitleaks-scan:
  stage: secret-scan
  tags:
    - srvdpwfdev
  script:
    - echo "Running Gitleaks scan using Docker container (only current files)..."
    - |
      docker run --rm -v "$PWD:/repo" -w /repo zricethezav/gitleaks:latest detect \
        --source=. --no-git \
        --verbose --redact \
        --report-format=json --report-path=gitleaks-report.json --exit-code 1 || export GITLEAKS_EXIT=1
    - echo "========== Gitleaks Report =========="
    - cat gitleaks-report.json || echo "No report file found."
    - echo "========== End of Gitleaks Report =========="
    - test "${GITLEAKS_EXIT:-0}" -eq 1 && exit 1 || true
  allow_failure: true
  artifacts:
    paths:
      - gitleaks-report.json
    when: always
  rules:
    - if: '$CI_COMMIT_BRANCH == "Devops-CICD"'
    - if: '$CI_COMMIT_BRANCH == "june-sonar-enable-branch"'
    - if: '$CI_COMMIT_BRANCH == "dev-dpw-foundation"'
trivy-code-scan:
  stage: trivy-scan
  tags:
    - srvdpwfdev
  script:
    - echo "Installing Trivy CLI locally..."
    - mkdir -p trivy-bin
    - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b trivy-bin
    - export PATH="$PWD/trivy-bin:$PATH"
    - echo "Running Trivy for filesystem (code/dependency) scan..."
    - trivy fs . --scanners vuln,secret,config --exit-code 0 --format json --output trivy-code-report.json
    - cat trivy-code-report.json || echo "No report generated"
  artifacts:
    paths:
      - trivy-code-report.json
    when: always
  allow_failure: true
  rules:
    - if: '$CI_COMMIT_BRANCH == "june-sonar-enable-branch"'
    - if: '$CI_COMMIT_BRANCH == "dev-dpw-foundation"'

sonarqube-check:
  stage: sonarqube-check
  tags:
    - srvdpwfdev
  script:
    - echo "Installing SonarScanner CLI..."
    - |
      SONAR_SCANNER_VERSION=5.0.1.3006
      wget -q https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-${SONAR_SCANNER_VERSION}-linux.zip
      unzip -q sonar-scanner-cli-${SONAR_SCANNER_VERSION}-linux.zip
      export PATH=$PWD/sonar-scanner-${SONAR_SCANNER_VERSION}-linux/bin:$PATH
    - |
      echo "Running SonarQube analysis (coverage & duplication skipped, Quality Gate check disabled)..."
      sonar-scanner \
        -Dsonar.projectKey=DPW_ADMIN \
        -Dsonar.sources=. \
        -Dsonar.inclusions=**/*.js,**/*.ts,**/*.jsx,**/*.tsx \
        -Dsonar.exclusions=**/node_modules/**,**/*.test.* \
        -Dsonar.coverage.exclusions=**/* \
        -Dsonar.cpd.exclusions=**/* \
        -Dsonar.sourceEncoding=UTF-8 \
        -Dsonar.login=${SONAR_TOKEN1} \
        -Dsonar.host.url=${SONAR_HOST_URL1} \
        -Dsonar.qualitygate.wait=false
  allow_failure: true
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev-dpw-foundation"'
    - if: '$CI_COMMIT_BRANCH == "palakT/dev-dpw-foundation-viewprofile"'
    - if: '$CI_COMMIT_BRANCH == "pankajc/beneficiary-module"'
    - if: '$CI_COMMIT_BRANCH == "kamlesh/admin-ui"'
    - if: '$CI_COMMIT_BRANCH == "manishd/finance-module"'
    - if: '$CI_COMMIT_BRANCH == "nehalm/finance-module"'
    - if: '$CI_COMMIT_BRANCH == "nehalm/enhancement"'
    - if: '$CI_COMMIT_BRANCH == "fatemap/finance_manage"'
    - if: '$CI_COMMIT_BRANCH == "fatema/uat_bugs"'
    - if: '$CI_COMMIT_BRANCH == "tushar/sonar-fix"'
    - if: '$CI_COMMIT_BRANCH == "tushar/react-query-builder"'
    - if: '$CI_COMMIT_BRANCH == "tushar/report-chart"'
    - if: '$CI_COMMIT_BRANCH == "tushar/bug-fix"'
    - if: '$CI_COMMIT_BRANCH == "tushar/bug-fix-grant"'

sonarqube-vulnerability-report:
  stage: sonarqube-vulnerability-report
  tags:
    - srvdpwfdev
  script:
    - >
      curl -H "Authorization: Bearer ${SONAR_TOKEN1}" "${SONAR_HOST_URL1}/api/issues/gitlab_sast_export?projectKey=DPW_ADMIN&branch=${CI_COMMIT_BRANCH}&pullRequest=${CI_MERGE_REQUEST_IID}" -o gl-sast-sonar-report.json
  allow_failure: true
  artifacts:
    expire_in: 1 day
    reports:
      sast: gl-sast-sonar-report.json
  rules:
    - if: '$CI_COMMIT_BRANCH == "june-sonar-enable-branch"'
    - if: '$CI_COMMIT_BRANCH == "dev-dpw-foundation"'
    - if: '$CI_COMMIT_BRANCH == "palakT/dev-dpw-foundation-viewprofile"'
    - if: '$CI_COMMIT_BRANCH == "pankajc/beneficiary-module"'
    - if: '$CI_COMMIT_BRANCH == "kamlesh/admin-ui"'
    - if: '$CI_COMMIT_BRANCH == "manishd/finance-module"'
    - if: '$CI_COMMIT_BRANCH == "nehalm/finance-module"'
    - if: '$CI_COMMIT_BRANCH == "nehalm/enhancement"'
    - if: '$CI_COMMIT_BRANCH == "fatemap/finance_manage"'
    - if: '$CI_COMMIT_BRANCH == "fatema/uat_bugs"'
    - if: '$CI_COMMIT_BRANCH == "tushar/sonar-fix"'
    - if: '$CI_COMMIT_BRANCH == "tushar/react-query-builder"'
    - if: '$CI_COMMIT_BRANCH == "tushar/report-chart"'
    - if: '$CI_COMMIT_BRANCH == "tushar/bug-fix"'
    - if: '$CI_COMMIT_BRANCH == "tushar/bug-fix-grant"'

# Stage 3: Build
Build:
  stage: Build
  tags:
    - srvdpwfdev
  script:
    - echo "Building Docker image"
    - docker build -t $IMAGE_NAME:$TAG .
  dependencies:
    - sonarqube-check
  needs:
    - job: sonarqube-check
      optional: true
  when: manual

# Stage 4: Deploy
Deploy:
  stage: Deploy
  tags:
    - srvdpwfdev
  script:
    - echo "Checking if container $CONTAINERNAME is already running"
    - if [ "$(docker ps -aq -f name=$CONTAINERNAME)" ]; then docker rm -f $CONTAINERNAME; fi
    - echo "Running Docker container"
    - docker run --name $CONTAINERNAME -p $PORT:3003 -e SECRET_KEY="$SECRET_KEY"  -itd $IMAGE_NAME:$TAG
  when: manual
  dependencies:
    - Build
  needs:
    - Build
